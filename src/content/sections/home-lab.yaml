summary: Network design, segmentation, and self-hosted services on real hardware.
intro: >-
  A mini-PC, a managed switch, an access point, and a NAS, turned into a
  properly segmented, observable network with your own storage at the center
  of it. Work the lessons in order. Each one assumes the hardware and
  addressing decided in the lessons before it.
